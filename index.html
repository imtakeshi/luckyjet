<!doctype html>
<html lang="ru">
  <head>
    <meta charset="UTF-8" />
    <title>Hack Lucky Jet Analyzer</title>
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <meta name="theme-color" content="#111827" />
    <link rel="stylesheet" href="./styles.css" />
    <!-- Манифест PWA для иконки на домашнем экране (Android/Chrome) -->
    <link rel="manifest" href="./manifest.webmanifest" />
    <!-- Иконка браузера / вкладки -->
    <link rel="icon" type="image/png" sizes="32x32" href="./assets/luckyjet-icon.png" />
    <link rel="icon" type="image/png" sizes="192x192" href="./assets/luckyjet-icon-192.png" />
    <!-- Иконка на рабочем столе телефона (iOS / Safari) -->
    <link rel="apple-touch-icon" sizes="180x180" href="./assets/luckyjet-icon-180.png" />
    <!-- React via CDN -->
    <script crossorigin src="https://unpkg.com/react@18/umd/react.development.js"></script>
    <script crossorigin src="https://unpkg.com/react-dom@18/umd/react-dom.development.js"></script>
    <script src="https://unpkg.com/@babel/standalone/babel.min.js"></script>
  </head>
  <body>
    <div id="root"></div>

    <script type="text/babel">
      const { useState, useEffect } = React;

      const PASSWORD = "lucky";
      const ALLOWED_LOGINS = ["admin", "danil13", "taxa07", "timyr2", "kamran4"];
      const USER_PROFILES = {
        admin: { label: "Administrator", badgeClass: "profile-admin" },
        danil13: { label: "Pro User", badgeClass: "profile-pro" },
        taxa07: { label: "Pro User", badgeClass: "profile-pro" },
        timyr2: { label: "Analyst", badgeClass: "profile-analyst" },
        kamran4: { label: "Analyst", badgeClass: "profile-analyst" },
        "1": { label: "Test Mode", badgeClass: "profile-test" },
      };

      function SplashScreen() {
        return (
          <div className="full-screen center splash-background">
            <div className="splash-card">
              <img
                src="./assets/luckyjet-icon.png"
                alt="Lucky Jet Icon"
                className="splash-icon"
              />
              <h1 className="splash-title">Hack Lucky Jet</h1>
              <p className="splash-subtitle">
                Запуск анализатора<span className="dots-loading">...</span>
              </p>
            </div>
          </div>
        );
      }

      function PasswordGate({ onSuccess }) {
        const [login, setLogin] = useState("");
        const [password, setPassword] = useState("");
        const [error, setError] = useState("");

        const handleSubmit = (e) => {
          e.preventDefault();
          const trimmedLogin = login.trim();
          const trimmedPassword = password.trim();

          const isStandardUser =
            ALLOWED_LOGINS.includes(trimmedLogin) && trimmedPassword === PASSWORD;

          const isTestUser = trimmedLogin === "1" && trimmedPassword === "1";

          if (!isStandardUser && !isTestUser) {
            setError("Неверный логин или пароль. Попробуйте ещё раз.");
            setPassword("");
            return;
          }

          setError("");
          onSuccess(trimmedLogin);
        };

        return (
          <div className="full-screen center main-background">
            <div className={"card password-card" + (error ? " shake" : "")}>
              <div className="card-header">
                <img
                  src="./assets/luckyjet-logo.png"
                  alt="LUCKYJET"
                  className="logo-wordmark"
                />
              </div>
              <div className="card-body">
                <h2 className="card-title">Вход в систему</h2>
                <p className="card-description">
                  Введите логин и пароль для доступа к анализатору.
                </p>
                <form onSubmit={handleSubmit} className="password-form">
                  <label className="input-label">
                    Логин
                    <input
                      type="text"
                      value={login}
                      onChange={(e) => setLogin(e.target.value)}
                      className="text-input"
                      placeholder="Например, admin"
                    />
                  </label>
                  <label className="input-label">
                    Пароль
                    <input
                      type="password"
                      value={password}
                      onChange={(e) => setPassword(e.target.value)}
                      className="text-input"
                      placeholder="Введите пароль"
                    />
                  </label>
                  {error && (
                    <div className="error-text">
                      {error}
                    </div>
                  )}
                  <button type="submit" className="primary-button">
                    Продолжить
                  </button>
                </form>
              </div>
              <div className="card-footer-small">
                Поиск игры<span className="dots-loading">...</span>
              </div>
            </div>
          </div>
        );
      }

      function SearchGameScreen() {
        return (
          <div className="full-screen center main-background">
            <div className="card search-card">
              <h2 className="card-title">Поиск игры Lucky Jet</h2>
              <p className="card-description">
                Идёт подключение к сессии казино. Подождите.
              </p>
              <div className="scan-wrapper">
                <div className="scanner-circle">
                  <div className="scanner-pulse" />
                  <div className="scanner-dot" />
                </div>
              </div>
              <div className="search-progress">
                <div className="search-progress-bar" />
              </div>
              <p className="search-status">
                Анализ соединения<span className="dots-loading">...</span>
              </p>
            </div>
          </div>
        );
      }

      function AdminPanel({ queueInputs, setQueueInputs, applyQueue }) {
        const handleChange = (index, value) => {
          const next = [...queueInputs];
          next[index] = value;
          setQueueInputs(next);
        };

        return (
          <div className="admin-panel">
            <h3 className="admin-title">Admin Panel</h3>
            <p className="admin-desc">
              Введите до 5 следующих коэффициентов, например 1.85 или 12.3.
            </p>
            <div className="admin-inputs">
              {queueInputs.map((v, i) => (
                <input
                  key={i}
                  className="text-input admin-input"
                  placeholder={"Прогноз " + (i + 1)}
                  value={v}
                  onChange={(e) => handleChange(i, e.target.value)}
                />
              ))}
            </div>
            <button className="secondary-button" onClick={applyQueue}>
              Сохранить прогнозы
            </button>
          </div>
        );
      }

      function HistoryList({ history }) {
        if (!history.length) {
          return (
            <div className="history-empty">
              История пуста. Получите первый прогноз.
            </div>
          );
        }
        return (
          <ul className="history-list">
            {history.map((coef, idx) => (
              <li key={idx} className="history-item">
                <span className={`coef-badge ${getCoefClass(coef)}`}>
                  {coef.toFixed(2)}x
                </span>
              </li>
            ))}
          </ul>
        );
      }

      function getRandomWeightedCoef() {
        const r = Math.random();
        let min, max;

        if (r < 0.7) {
          // 70%: 0.5 - 4
          min = 0.5;
          max = 4;
        } else if (r < 0.85) {
          // 15%: 4 - 20
          min = 4;
          max = 20;
        } else if (r < 0.95) {
          // 10%: 20 - 150
          min = 20;
          max = 150;
        } else {
          // 5%: 150 - 1000
          min = 150;
          max = 1000;
        }

        return min + Math.random() * (max - min);
      }

      function getCoefClass(value) {
        if (value < 2) return "coef-low";
        if (value < 10) return "coef-mid";
        return "coef-high";
      }

      function MainInterface({
        currentCoef,
        history,
        isAnalyzing,
        onGetPrediction,
        hasQueue,
        username,
        logLines,
      }) {
        const [statusReady, setStatusReady] = useState(false);
        const [ping, setPing] = useState(34);

        useEffect(() => {
          const interval = setInterval(() => {
            setPing((prev) => {
              const delta = Math.round((Math.random() - 0.5) * 8);
              let next = prev + delta;
              if (next < 22) next = 22;
              if (next > 85) next = 85;
              return next;
            });
          }, 1800);
          return () => clearInterval(interval);
        }, []);

        useEffect(() => {
          const id = setTimeout(() => setStatusReady(true), 5500);
          return () => clearTimeout(id);
        }, []);

        const coefDisplay =
          currentCoef != null ? currentCoef.toFixed(2) + "x" : "--";
        const coefClass =
          currentCoef != null ? getCoefClass(currentCoef) : "coef-empty";

        let signalLabel = "Нет сигнала";
        let confidence = 20;
        if (currentCoef != null) {
          if (currentCoef < 2) {
            signalLabel = "Conservative";
            confidence = 55;
          } else if (currentCoef < 10) {
            signalLabel = "Normal";
            confidence = 72;
          } else {
            signalLabel = "High‑Risk";
            confidence = 38;
          }
        }

        return (
          <div className="full-screen center main-background">
            <div className="card analyzer-card">
              <header className="card-header">
                <div className="header-left">
                  <img
                    src="./assets/luckyjet-icon.png"
                    alt="Lucky Jet"
                    className="header-icon"
                  />
                  <img
                    src="./assets/luckyjet-logo.png"
                    alt="LUCKYJET"
                    className="logo-wordmark header-wordmark"
                  />
                </div>
                <StatusPill ready={statusReady} />
              </header>
              <div className="server-strip">
                <span className="server-name">Сервер: LuckyJet-EU</span>
                <span className="server-meta">
                  Пинг: <span className="server-ping">{ping} ms</span>
                </span>
              </div>

              <main className="card-body analyzer-body">
                <div className="display-wrapper">
                  <div className={`coef-display ${coefClass}`}>
                    {coefDisplay}
                  </div>
                  <div className="display-caption">
                    Текущий «предсказанный» коэффициент
                  </div>
                  <div className="signal-row">
                    <span className="signal-label">{signalLabel}</span>
                    <div className="confidence-bar">
                      <div
                        className="confidence-fill"
                        style={{ width: confidence + "%" }}
                      />
                    </div>
                    <span className="confidence-value">{confidence}%</span>
                  </div>
                </div>

                <div className="scan-section">
                  <div className="scan-visual">
                    <div
                      className={
                        "radar-circle " + (isAnalyzing ? "radar-active" : "")
                      }
                    >
                      <div className="radar-beam" />
                      <div className="radar-center" />
                    </div>
                    <div className="mini-chart">
                      <div className="chart-bar bar-1" />
                      <div className="chart-bar bar-2" />
                      <div className="chart-bar bar-3" />
                      <div className="chart-bar bar-4" />
                    </div>
                  </div>
                  <div className="scan-controls">
                    <button
                      className={
                        "primary-button wide-button " +
                        (isAnalyzing || !statusReady ? "disabled not-ready" : "")
                      }
                      onClick={onGetPrediction}
                      disabled={isAnalyzing || !statusReady}
                    >
                      {isAnalyzing ? "Анализ игры..." : "Получить прогноз"}
                    </button>
                    {isAnalyzing && (
                      <div className="progress-bar">
                        <div className="progress-fill" />
                      </div>
                    )}
                  </div>
                </div>

                <section className="history-section">
                  <h3 className="section-title">История последних прогнозов</h3>
                  <HistoryList history={history} />
                </section>

                <section className="log-section">
                  <h3 className="section-title">Лог анализа</h3>
                  <LogList lines={logLines} />
                </section>
              </main>
            </div>
          </div>
        );
      }

      function StatusPill({ ready }) {
        return (
          <div
            className={
              "status-pill " + (ready ? "status-ready" : "status-pending")
            }
          >
            <span className="status-dot" />
            <span className="status-text">
              {ready ? "Система готова" : "Настройка системы"}
            </span>
          </div>
        );
      }

      function LogList({ lines }) {
        if (!lines.length) {
          return (
            <div className="history-empty">
              Лог пуст. Запустите анализ, чтобы увидеть детали.
            </div>
          );
        }
        return (
          <ul className="log-list">
            {lines.map((line, idx) => (
              <li key={idx} className="log-item">
                {line}
              </li>
            ))}
          </ul>
        );
      }

      function App() {
        const [phase, setPhase] = useState("splash"); // splash | password | searching | main
        const [currentCoef, setCurrentCoef] = useState(null);
        const [history, setHistory] = useState([]);
        const [queue, setQueue] = useState([]);
        const [queueInputs, setQueueInputs] = useState(["", "", "", "", ""]);
        const [isAnalyzing, setIsAnalyzing] = useState(false);
        const [adminOpen, setAdminOpen] = useState(false);
        const [username, setUsername] = useState("");
        const [userProfile, setUserProfile] = useState(null);
        const [logLines, setLogLines] = useState([]);

        useEffect(() => {
          const id = setTimeout(() => setPhase("password"), 2000);
          return () => clearTimeout(id);
        }, []);

        useEffect(() => {
          if (phase === "searching") {
            const id = setTimeout(() => setPhase("main"), 7500);
            return () => clearTimeout(id);
          }
        }, [phase]);

        const handlePasswordSuccess = (loginName) => {
          setUsername(loginName);
          setUserProfile(
            USER_PROFILES[loginName] || { label: "User", badgeClass: "profile-default" }
          );
          setPhase("searching");
        };

        const applyQueue = () => {
          const parsed = queueInputs
            .map((v) => parseFloat(v.replace(",", ".")))
            .filter((n) => !Number.isNaN(n) && n > 0)
            .slice(0, 5);
          setQueue(parsed);
        };

        const addLog = (text) => {
          const now = new Date();
          const hh = String(now.getHours()).padStart(2, "0");
          const mm = String(now.getMinutes()).padStart(2, "0");
          const ss = String(now.getSeconds()).padStart(2, "0");
          const line = `[${hh}:${mm}:${ss}] ${text}`;
          setLogLines((prev) => [line, ...prev].slice(0, 6));
        };

        const handleGetPrediction = () => {
          if (isAnalyzing) return;
          setIsAnalyzing(true);
          addLog("Запуск анализа текущей сессии Lucky Jet...");
          if (userProfile && userProfile.badgeClass === "profile-admin") {
            addLog("DEBUG: Сбор телеметрии (latency, seed, окно истории)...");
          }
          const duration = 3500;
          setTimeout(() => {
            setQueue((prev) => {
              let nextCoef = null;
              let rest = prev;

              if (prev.length) {
                [nextCoef, ...rest] = prev;
              } else {
                nextCoef = getRandomWeightedCoef();
              }

              if (nextCoef != null) {
                setCurrentCoef(nextCoef);
                setHistory((h) => [nextCoef, ...h].slice(0, 5));
                addLog(`Получен прогноз: ${nextCoef.toFixed(2)}x (модуль LuckyCore v2)`);
              }

              setIsAnalyzing(false);
              return rest;
            });
          }, duration);
        };

        let content = null;
        if (phase === "splash") {
          content = <SplashScreen />;
        } else if (phase === "password") {
          content = <PasswordGate onSuccess={handlePasswordSuccess} />;
        } else if (phase === "searching") {
          content = <SearchGameScreen />;
        } else {
          content = (
            <>
              <MainInterface
                currentCoef={currentCoef}
                history={history}
                isAnalyzing={isAnalyzing}
                onGetPrediction={handleGetPrediction}
                hasQueue={queue.length > 0}
                username={username}
                logLines={logLines}
              />
              <div className="top-right-user">
                <span
                  className={
                    "user-label " + (userProfile ? userProfile.badgeClass : "profile-default")
                  }
                >
                  {username}
                  {userProfile && userProfile.label
                    ? " • " + userProfile.label
                    : ""}
                </span>
                <button
                  className="admin-toggle"
                  onClick={() => setAdminOpen((v) => !v)}
                  title="Открыть админ-панель"
                >
                  ⚙
                </button>
              </div>
              {adminOpen && (
                <div className="admin-container">
                  <AdminPanel
                    queueInputs={queueInputs}
                    setQueueInputs={setQueueInputs}
                    applyQueue={applyQueue}
                  />
                </div>
              )}
            </>
          );
        }

        return content;
      }

      const root = ReactDOM.createRoot(document.getElementById("root"));
      root.render(<App />);
    </script>
  </body>
</html>
